spring:
  application:
    name: securepay-core
  main:
    banner-mode: off
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  lifecycle:
    timeout-per-shutdown-phase: ${securepay.shutdown.timeout-seconds}s
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:securepay_local}
    username: ${POSTGRES_USER:securepay_local}
    password: ${POSTGRES_PASSWORD:local_dev_only_change_me}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: securepay-core
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      validation-timeout: 2000
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${APP_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      base-path: /internal/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    defaults:
      enabled: false

securepay:
  application:
    name: securepay-core
    environment: ${ENVIRONMENT:local}
  api:
    version: 1.0.0
  shutdown:
    timeout-seconds: 30

logging:
  level:
    root: ${LOG_LEVEL:info}
