# SecurePay API — Local development (Phase 2)
#
# Start infrastructure and application:
#   docker compose --env-file .env.example up --build
#
# Stop:
#   docker compose --env-file .env.example down

services:
  postgres:
    image: postgres:16-alpine
    container_name: securepay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - securepay_postgres_data:/var/lib/postgresql/data
    networks:
      - securepay_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: securepay-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - securepay_redis_data:/data
    networks:
      - securepay_local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: ["redis-server", "--appendonly", "yes"]

  securepay-core:
    build:
      context: .
      dockerfile: services/securepay-core/Dockerfile
    container_name: securepay-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      ENVIRONMENT: local
      APP_PORT: 8080
      MANAGEMENT_PORT: 8081
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${MANAGEMENT_PORT:-8081}:8081"
    networks:
      - securepay_local
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  securepay_local:
    name: securepay_local
    driver: bridge

volumes:
  securepay_postgres_data:
    name: securepay_postgres_data
  securepay_redis_data:
    name: securepay_redis_data
