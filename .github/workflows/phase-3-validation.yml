name: Phase 3 Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Phase 3 persistence foundation validation
    runs-on: ubuntu-latest
    env:
      SECUREPAY_REQUIRE_TESTCONTAINERS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-validation.txt

      - name: Install Phase 1 validation dependencies
        run: pip install -r scripts/requirements-validation.txt

      - name: Run Phase 1 validation suite
        run: bash scripts/run_all_validations.sh

      - name: Validate Gradle wrapper
        run: ./gradlew wrapper --gradle-version 8.12.1 --dry-run

      - name: Gradle unit tests
        run: ./gradlew clean test --no-daemon

      - name: Gradle integration tests (Testcontainers required)
        run: ./gradlew integrationTest --no-daemon
        env:
          SECUREPAY_REQUIRE_TESTCONTAINERS: "true"

      - name: Gradle doctrine tests
        run: ./gradlew doctrineTest --no-daemon

      - name: Secret scan
        run: python3 scripts/scan_secrets.py

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet

      - name: Compose runtime health validation
        run: |
          set -euo pipefail
          cleanup() {
            docker compose --env-file .env.example down --volumes || true
          }
          on_failure() {
            echo "=== docker compose ps ==="
            docker compose --env-file .env.example ps || true
            echo "=== docker compose logs (no-color) ==="
            docker compose --env-file .env.example logs --no-color || true
          }
          trap cleanup EXIT
          trap on_failure ERR

          docker compose --env-file .env.example up --build -d

          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live >/dev/null; then
              echo "health/live responded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "Timed out waiting for http://localhost:8080/health/live"
              exit 1
            fi
            sleep 5
          done

          curl --fail http://localhost:8080/health/live
          curl --fail http://localhost:8080/health/ready
          curl --fail http://localhost:8080/health/dependencies
          echo "Compose runtime health validation passed"
