name: Phase 3 Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  foundation-validation:
    name: Foundation validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-validation.txt

      - name: Install Phase 1 validation dependencies
        run: pip install -r scripts/requirements-validation.txt

      - name: Run Phase 1 validation suite
        run: bash scripts/run_all_validations.sh

      - name: Validate Gradle wrapper
        run: ./gradlew wrapper --gradle-version 8.12.1 --dry-run

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle unit tests
        run: ./gradlew clean test --no-daemon

  integration-tests:
    name: Integration tests (Testcontainers required)
    runs-on: ubuntu-latest
    env:
      SECUREPAY_REQUIRE_TESTCONTAINERS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle integration tests
        run: ./gradlew integrationTest --no-daemon
        env:
          SECUREPAY_REQUIRE_TESTCONTAINERS: "true"

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            services/securepay-core/build/reports/tests/integrationTest/
            services/securepay-core/build/test-results/integrationTest/

  doctrine-tests:
    name: Doctrine tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle doctrine tests
        run: ./gradlew doctrineTest --no-daemon

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        run: python3 scripts/scan_secrets.py

  compose-config:
    name: Docker Compose configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet

  compose-runtime:
    name: Compose runtime health
    runs-on: ubuntu-latest
    needs:
      - unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build application image inputs
        run: ./gradlew :services:securepay-core:bootJar --no-daemon

      - name: Compose runtime health validation
        run: |
          set -euo pipefail
          cleanup() {
            docker compose --env-file .env.example down --volumes || true
          }
          on_failure() {
            echo "=== docker compose ps ==="
            docker compose --env-file .env.example ps || true
            echo "=== docker compose logs (no-color) ==="
            docker compose --env-file .env.example logs --no-color || true
          }
          trap cleanup EXIT
          trap on_failure ERR

          docker compose --env-file .env.example up --build -d

          for attempt in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live >/dev/null; then
              echo "health/live responded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "Timed out waiting for http://localhost:8080/health/live"
              exit 1
            fi
            sleep 5
          done

          curl --fail http://localhost:8080/health/live
          curl --fail http://localhost:8080/health/ready
          curl --fail http://localhost:8080/health/dependencies
          echo "Compose runtime health validation passed"

  phase-3-complete:
    name: Phase 3 validation complete
    runs-on: ubuntu-latest
    needs:
      - foundation-validation
      - unit-tests
      - integration-tests
      - doctrine-tests
      - secret-scan
      - compose-config
      - compose-runtime
    steps:
      - name: Confirm all mandatory Phase 3 checks passed
        run: echo "All mandatory Phase 3 validation jobs passed."
