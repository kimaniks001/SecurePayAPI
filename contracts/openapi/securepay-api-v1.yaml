openapi: 3.1.0
info:
  title: SecurePay API
  version: 1.0.0
  description: |
    SecurePay is an API-first, agreement-driven financial platform.

    **Central doctrine:** Money should follow the agreement.

    SecureLinks represent versioned agreements between identifiable parties. Funding,
    evidence, approvals, reviews, and Payment Ready evaluation determine when settlement
    may proceed. The public API exposes domain actions and read models; it does not
    expose internal ledger postings or banking-provider implementation details.

    Phase 1 provides contract foundations only. Business endpoints will be added in
    later phases without breaking the standard envelopes defined here.
  contact:
    name: SecurePay Platform Engineering
  license:
    name: Proprietary

servers:
  - url: https://api.sandbox.securepay.example/v1
    description: Sandbox server (placeholder — not yet deployed)
  - url: https://api.securepay.example/v1
    description: Production server (placeholder — not yet deployed)

