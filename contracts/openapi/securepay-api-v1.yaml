paths:
  /health/live:
    get:
      operationId: getHealthLive
      tags: [Health]
      summary: Liveness probe
      description: Returns 200 when the process is running. Does not verify dependencies.
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                success: true
                data:
                  status: alive
                meta:
                  request_id: req_01hexample
                  correlation_id: corr_01hexample
                  api_version: '1.0.0'
                  timestamp: '2026-07-22T09:00:00Z'

  /health/ready:
    get:
      operationId: getHealthReady
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 when the service is ready to accept traffic.
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /health/dependencies:
    get:
      operationId: getHealthDependencies
      tags: [Health]
      summary: Dependency health probe
      description: Reports health of configured dependencies (database, cache, queues).
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Dependency health summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          dependencies:
                            type: array
                            items:
                              $ref: '#/components/schemas/DependencyHealth'
        '503':
          description: One or more critical dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Placeholder for end-user and administrator bearer tokens.
        Final token format and claims will be defined in the Authentication phase.
    PartnerClientCredentials:
      type: oauth2
      description: |
        Placeholder for partner application authentication.
        Final grant types and scopes will be defined in the Partner Applications phase.
      flows:
        clientCredentials:
          tokenUrl: https://api.securepay.example/v1/oauth/token
          scopes:
            securelinks:read: Read SecureLink resources
            securelinks:write: Create and transition SecureLinks
            ledger:read: Read ledger views
            webhooks:manage: Manage webhook subscriptions

  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Unique identifier for this HTTP request, generated by the client or edge proxy.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        example: req_01h2example0001
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Correlates a business operation across services and async events.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        example: corr_01h2example0001
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Required for mutating financial and agreement commands once implemented.
        Duplicate requests with the same key return the original result.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        example: idem_01h2example0001

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Response payload. Shape varies by endpoint.
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ErrorEnvelope:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: VALIDATION_ERROR
        message:
          type: string
          description: User-safe error message. No stack traces or internal details.
          example: One or more fields failed validation.
        details:
          type: array
          description: Optional structured validation or context details.
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

    ValidationErrorDetail:
      type: object
      required: [field, issue]
      properties:
        field:
          type: string
          description: JSON pointer or field name.
          example: amount
        issue:
          type: string
          description: Human-readable issue description safe for clients.
          example: must be a positive number
        code:
          type: string
          description: Machine-readable validation code.
          example: invalid_value

    ResponseMeta:
      type: object
      required: [request_id, api_version, timestamp]
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        api_version:
          type: string
          example: '1.0.0'
        timestamp:
          type: string
          format: date-time
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 200
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_previous:
          type: boolean
        next_cursor:
          type: string
          nullable: true
        previous_cursor:
          type: string
          nullable: true

    DependencyHealth:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: postgres
        status:
          type: string
          enum: [healthy, degraded, unavailable]
        latency_ms:
          type: number
          minimum: 0
        message:
          type: string
          description: Optional user-safe detail.

security:
  - BearerAuth: []
  - PartnerClientCredentials: []
